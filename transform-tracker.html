<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Transform 2026 — Connection Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1c1c1e; --paper: #f5f2ed; --cream: #ede8df; --gold: #b8963e;
    --gold-light: #f0e6ce; --rust: #c05a2a; --muted: #7a7068; --border: #d8d0c4;
    --white: #ffffff; --green: #2a7a4a;
  }
  body { font-family: 'Lato', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; padding-bottom: 80px; }

  .header { background: var(--ink); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-family: 'Playfair Display', serif; color: white; font-size: 17px; line-height: 1.2; }
  .header-title span { color: #e0b86a; }
  .header-meta { font-size: 11px; color: #6a6070; margin-top: 2px; font-weight: 300; letter-spacing: 0.05em; }
  .header-right { display: flex; gap: 8px; }
  .hbtn { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 13px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
  .hbtn-log { background: var(--gold); color: white; }
  .hbtn-log:hover { background: #a07830; }
  .hbtn-list { background: #2e2e3e; color: #aaa; }
  .hbtn-list:hover { background: #3e3e50; color: white; }
  .hbtn.active-view { background: var(--rust); color: white; }

  .main { padding: 20px 16px; max-width: 560px; margin: 0 auto; }

  .who-bar { background: var(--ink); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .who-bar-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #6a6070; white-space: nowrap; }
  .who-bar select { flex: 1; background: #2e2e3e; border: 1.5px solid #3e3e52; color: white; font-family: 'Lato', sans-serif; font-size: 14px; padding: 8px 10px; border-radius: 8px; cursor: pointer; -webkit-appearance: none; }
  .who-bar select:focus { outline: none; border-color: var(--gold); }

  .form-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .form-card-title { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 18px; color: var(--ink); }

  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; font-family: 'Lato', sans-serif; font-size: 15px; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px; background: var(--paper); color: var(--ink); transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gold); background: white; }
  .field textarea { resize: vertical; line-height: 1.6; min-height: 80px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

  /* AUTOCOMPLETE */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1.5px solid var(--gold); border-radius: 10px; z-index: 99; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: none; }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.focused { background: var(--gold-light); }
  .autocomplete-name { font-weight: 700; font-size: 14px; }
  .autocomplete-company { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .autocomplete-highlight { color: var(--gold); }

  .chip-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip { padding: 7px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 12.5px; font-family: 'Lato', sans-serif; cursor: pointer; transition: all 0.12s; color: var(--muted); }
  .chip:hover { border-color: var(--gold); color: var(--ink); }
  .chip.selected { background: var(--ink); border-color: var(--ink); color: white; }

  .submit-btn { width: 100%; padding: 14px; background: var(--ink); color: white; border: none; border-radius: 12px; font-family: 'Playfair Display', serif; font-size: 16px; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
  .submit-btn:hover { background: #2e2e3e; transform: translateY(-1px); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: white; padding: 13px 24px; border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 200; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .log-title { font-family: 'Playfair Display', serif; font-size: 22px; }
  .log-count { background: var(--gold-light); color: var(--gold); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .export-btn { width: 100%; padding: 13px; background: var(--gold); color: white; border: none; border-radius: 12px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; margin-bottom: 20px; transition: all 0.15s; }
  .export-btn:hover { background: #a07830; }

  .entry-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
  .entry-name { font-weight: 700; font-size: 15px; }
  .entry-company { font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .entry-meta { font-size: 11.5px; color: #b0a898; margin-bottom: 4px; }
  .entry-tag { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--gold-light); color: var(--gold); margin-right: 4px; margin-bottom: 3px; }
  .entry-notes { font-size: 13px; color: var(--ink); line-height: 1.5; background: var(--paper); border-radius: 7px; padding: 8px 10px; margin-top: 6px; }
  .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 3px 5px; transition: color 0.15s; }
  .delete-btn:hover { color: var(--rust); }
  .empty-log { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  @media (max-width: 400px) { .field-row { grid-template-columns: 1fr; } }
</style>
</head>

</div>

let entries = JSON.parse(localStorage.getItem('transform2026') || '[]');
let currentMember = localStorage.getItem('transform2026_member') || '';
let acFocusIdx = -1;
let acMatches = [];

const DAYS = {
  '2026-03-23': 'Monday, March 23',
  '2026-03-24': 'Tuesday, March 24',
  '2026-03-25': 'Wednesday, March 25',
};

function getToday() {
  const key = new Date().toISOString().slice(0,10);
  return DAYS[key] || new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
}

function init() {
  if (currentMember) document.getElementById('svMember').value = currentMember;
  renderEntries();
}

function saveMember() {
  currentMember = document.getElementById('svMember').value;
  localStorage.setItem('transform2026_member', currentMember);
}

// AUTOCOMPLETE
function autocomplete(query) {
  const list = document.getElementById('acList');
  acFocusIdx = -1;
  if (!query || query.length < 2) { list.classList.remove('open'); return; }
  const q = query.toLowerCase();
  acMatches = GUESTS.filter(g =>
    g.name.toLowerCase().includes(q) || g.company.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!acMatches.length) { list.classList.remove('open'); return; }
  list.innerHTML = acMatches.map((g, i) => {
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const hl = (str) => {
      try {
        return str.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="autocomplete-highlight">$1</span>');
      } catch(e) { return str; }
    };
    return `<div class="autocomplete-item" data-idx="${i}" onmousedown="selectGuest(${i})">
      <div class="autocomplete-name">${hl(g.name)}</div>
      <div class="autocomplete-company">${hl(g.company)}</div>
    </div>`;
  }).join('');
  list.classList.add('open');
}

function selectGuest(idx) {
  const g = acMatches[idx];
  if (!g) return;
  document.getElementById('extName').value = g.name;
  document.getElementById('extCompany').value = g.company;
  document.getElementById('acList').classList.remove('open');
  document.getElementById('notes').focus();
}

function acKeydown(e) {
  const list = document.getElementById('acList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!list.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acFocusIdx = Math.min(acFocusIdx+1, items.length-1); updateAcFocus(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acFocusIdx = Math.max(acFocusIdx-1, 0); updateAcFocus(items); }
  else if (e.key === 'Enter' && acFocusIdx >= 0) { e.preventDefault(); selectGuest(acFocusIdx); }
  else if (e.key === 'Escape') { list.classList.remove('open'); }
}

function updateAcFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('acList').classList.remove('open');
  }
});

// CHIPS
function toggleChip(el, group) {
  if (group === 'event') {
    const already = el.classList.contains('selected');
    document.getElementById('eventChips').querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    if (!already) el.classList.add('selected');
  } else {
    el.classList.toggle('selected');
    if (el.textContent.includes('No action')) {
      document.getElementById('actionChips').querySelectorAll('.chip').forEach(c => {
        if (!c.textContent.includes('No action')) c.classList.remove('selected');
      });
    } else {
      document.getElementById('actionChips').querySelectorAll('.chip').forEach(c => {
        if (c.textContent.includes('No action')) c.classList.remove('selected');
      });
    }
  }
}

function getSelectedChips(id) {
  return Array.from(document.getElementById(id).querySelectorAll('.chip.selected'))
    .map(c => c.textContent.trim()).join(', ');
}

const AIRTABLE_TOKEN = 'patwo3JXgGMPeNWjh.b6c0e9afc71bbdc33a5aa6f54a3c4c9691019f3ad93abffd3e708d9eaee29041';
const AIRTABLE_BASE = 'apprA2DsmcOyrQiWx';
const AIRTABLE_TABLE = 'Connections';

async function postToAirtable(entry) {
  try {
    await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        fields: {
          'Date': entry.date,
          'Where Met': entry.event || '',
          'SV Team Member': entry.svMember || '',
          'External Name': entry.extName || '',
          'Their Company': entry.extCompany || '',
          'Action Tags': entry.actions || '',
          'Notes / Next Steps': entry.notes || '',
          'Logged At': entry.timestamp
        }
      })
    });
  } catch(e) {
    console.warn('Airtable sync failed, saved locally:', e);
  }
}

async function logEntry() {
  const member = document.getElementById('svMember').value;
  const name = document.getElementById('extName').value.trim();
  const company = document.getElementById('extCompany').value.trim();
  const event = getSelectedChips('eventChips');
  const actions = getSelectedChips('actionChips');
  const notes = document.getElementById('notes').value.trim();

  if (!member) { alert('Please select your name at the top first.'); return; }
  if (!name) { document.getElementById('extName').focus(); return; }

  const btn = document.querySelector('.submit-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  const entry = { id: Date.now(), timestamp: new Date().toISOString(), date: getToday(), event, svMember: member, extName: name, extCompany: company, actions, notes };
  
  // Save locally first (instant, no data loss if network fails)
  entries.unshift(entry);
  localStorage.setItem('transform2026', JSON.stringify(entries));

  // Then post to Airtable silently
  await postToAirtable(entry);

  btn.textContent = 'Log Connection';
  btn.disabled = false;

  document.getElementById('extName').value = '';
  document.getElementById('extCompany').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('eventChips').querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('actionChips').querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('acList').classList.remove('open');
  document.getElementById('extName').focus();

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
  renderEntries();
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  localStorage.setItem('transform2026', JSON.stringify(entries));
  renderEntries();
}

function renderEntries() {
  document.getElementById('totalCount').textContent = entries.length;
  const el = document.getElementById('entryList');
  if (!entries.length) { el.innerHTML = '<div class="empty-log"><div class="empty-icon">📋</div>No connections logged yet.</div>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="entry-card">
      <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
      <div class="entry-name">${e.extName || '—'}</div>
      <div class="entry-company">${e.extCompany || ''}</div>
      <div class="entry-meta">${e.svMember} · ${e.event || 'No event specified'} · ${e.date}</div>
      ${e.actions ? `<div style="margin-top:5px;">${e.actions.split(', ').map(a=>`<span class="entry-tag">${a}</span>`).join('')}</div>` : ''}
      ${e.notes ? `<div class="entry-notes">${e.notes}</div>` : ''}
    </div>`).join('');
}

function showView(view) {
  document.getElementById('log-view').style.display = view==='log-view' ? 'block' : 'none';
  document.getElementById('list-view').style.display = view==='list-view' ? 'block' : 'none';
  document.getElementById('btnLog').classList.toggle('active-view', view==='log-view');
  document.getElementById('btnList').classList.toggle('active-view', view==='list-view');
  if (view==='list-view') renderEntries();
}

function exportCSV() {
  if (!entries.length) { alert('No entries to export yet.'); return; }
  const headers = ['Date','Where Met','SV Team Member','External Name','Their Company','Action Tags','Notes/Next Steps'];
  const rows = entries.map(e => [e.date,e.event,e.svMember,e.extName,e.extCompany,e.actions,e.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`));
  const csv = [headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'Transform2026_Connections.csv';
  a.click();
}
