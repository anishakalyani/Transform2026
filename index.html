<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Transform 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1c1e;--paper:#f5f2ed;--gold:#b8963e;--gold-light:#f0e6ce;--rust:#c05a2a;--muted:#7a7068;--border:#d8d0c4;--green:#2a7a4a}
body{font-family:Lato,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:80px}
.hdr{background:var(--ink);padding:16px 20px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.htitle{font-family:"Playfair Display",serif;color:#fff;font-size:17px;line-height:1.2}
.htitle span{color:#e0b86a}
.hmeta{font-size:11px;color:#6a6070;margin-top:2px}
.hbtns{display:flex;gap:8px}
.hbtn{font-family:Lato,sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:7px 13px;border-radius:6px;border:none;cursor:pointer}
.blog{background:var(--gold);color:#fff}.blist{background:#2e2e3e;color:#aaa}.bav{background:var(--rust);color:#fff}
.main{padding:20px 16px;max-width:560px;margin:0 auto}
.whobar{background:var(--ink);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.wlbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6a6070;white-space:nowrap}
.whobar select{flex:1;background:#2e2e3e;border:1.5px solid #3e3e52;color:#fff;font-family:Lato,sans-serif;font-size:14px;padding:8px 10px;border-radius:8px;cursor:pointer;-webkit-appearance:none}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.ctitle{font-family:"Playfair Display",serif;font-size:18px;margin-bottom:18px}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fld input,.fld textarea{width:100%;font-family:Lato,sans-serif;font-size:15px;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;background:var(--paper);color:var(--ink);-webkit-appearance:none;appearance:none}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--gold);background:#fff}
.fld textarea{resize:vertical;line-height:1.6;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.acw{position:relative}
.acl{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--gold);border-radius:10px;z-index:99;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none}
.acl.open{display:block}
.aci{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border)}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.foc{background:var(--gold-light)}
.ain{font-weight:700;font-size:14px}
.aic{font-size:12px;color:var(--muted);margin-top:1px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12.5px;font-family:Lato,sans-serif;cursor:pointer;color:var(--muted)}
.chip:hover{border-color:var(--gold);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.sbtn{width:100%;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-family:"Playfair Display",serif;font-size:16px;cursor:pointer;margin-top:4px}
.sbtn:disabled{opacity:.6;cursor:default}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#fff;padding:13px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.err{background:#fde8e8;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.err.show{display:block}
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ltitle{font-family:"Playfair Display",serif;font-size:22px}
.lcount{background:var(--gold-light);color:var(--gold);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.ebtn{width:100%;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:12px;font-family:Lato,sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:20px}
.ec{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;position:relative}
.en{font-weight:700;font-size:15px}
.eco{font-size:13px;color:var(--muted);margin-bottom:4px}
.em{font-size:11.5px;color:#b0a898;margin-bottom:4px}
.et{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--gold-light);color:var(--gold);margin-right:4px;margin-bottom:3px}
.eno{font-size:13px;line-height:1.5;background:var(--paper);border-radius:7px;padding:8px 10px;margin-top:6px}
.db{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:3px 5px}
.db:hover{color:var(--rust)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
@media(max-width:400px){.frow{grid-template-columns:1fr}}
</style>
</head>

</div>

function swho(){member=document.getElementById('who').value;try{localStorage.setItem('sv26m',member);}catch(e){}}

function gtd(){
  var d=new Date(),k=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
  var m={'2026-03-23':'Monday March 23','2026-03-24':'Tuesday March 24','2026-03-25':'Wednesday March 25'};
  return m[k]||d.toDateString();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Autocomplete
document.getElementById('nm').addEventListener('input',function(){ac(this.value);});
document.getElementById('nm').addEventListener('keydown',function(e){kd(e);});
document.addEventListener('click',function(e){if(!e.target.closest('.acw'))document.getElementById('acl').classList.remove('open');});

function ac(q){
  var l=document.getElementById('acl');ai=-1;
  if(!q||q.length<2){l.classList.remove('open');return;}
  var ql=q.toLowerCase();am=[];
  for(var i=0;i<G.length&&am.length<8;i++){
    if(G[i].n.toLowerCase().indexOf(ql)!==-1||G[i].c.toLowerCase().indexOf(ql)!==-1)am.push(G[i]);
  }
  if(!am.length){l.classList.remove('open');return;}
  var h='';
  for(var j=0;j<am.length;j++){h+='<div class="aci" data-i="'+j+'"><div class="ain">'+esc(am[j].n)+'</div><div class="aic">'+esc(am[j].c)+'</div></div>';}
  l.innerHTML=h;
  var its=l.querySelectorAll('.aci');
  for(var k=0;k<its.length;k++){(function(idx){its[idx].addEventListener('mousedown',function(e){e.preventDefault();sg(idx);});})(k);}
  l.classList.add('open');
}

function sg(i){
  if(!am[i])return;
  document.getElementById('nm').value=am[i].n;
  document.getElementById('co').value=am[i].c;
  document.getElementById('acl').classList.remove('open');
  document.getElementById('no').focus();
}

function kd(e){
  var l=document.getElementById('acl');
  if(!l.classList.contains('open'))return;
  var its=l.querySelectorAll('.aci');
  if(e.key==='ArrowDown'){e.preventDefault();ai=Math.min(ai+1,its.length-1);uf(its);}
  else if(e.key==='ArrowUp'){e.preventDefault();ai=Math.max(ai-1,0);uf(its);}
  else if(e.key==='Enter'&&ai>=0){e.preventDefault();sg(ai);}
  else if(e.key==='Escape'){l.classList.remove('open');}
}
function uf(its){for(var i=0;i<its.length;i++)its[i].className=i===ai?'aci foc':'aci';}

// Chips
function te(el,id){
  var on=el.classList.contains('on');
  document.getElementById(id).querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  if(!on)el.classList.add('on');
}
function ta(el){
  if(el.textContent.indexOf('No action')!==-1){
    var on=el.classList.contains('on');
    document.getElementById('ac').querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
    if(!on)el.classList.add('on');
  } else {
    document.getElementById('ac').querySelectorAll('.chip').forEach(function(c){if(c.textContent.indexOf('No action')!==-1)c.classList.remove('on');});
    el.classList.toggle('on');
  }
}
function gc(id){
  var r=[];document.getElementById(id).querySelectorAll('.chip.on').forEach(function(c){r.push(c.textContent);});return r.join(', ');
}

function se(msg){var e=document.getElementById('er');e.textContent=msg;e.classList.add('show');}
function he(){document.getElementById('er').classList.remove('show');}

function log(){
  he();
  var w=document.getElementById('who').value;
  var n=document.getElementById('nm').value.trim();
  if(!w){se('Please select your name first.');return;}
  if(!n){se('Please enter their name.');document.getElementById('nm').focus();return;}
  var btn=document.getElementById('sb');btn.textContent='Saving...';btn.disabled=true;
  var e={id:Date.now(),ts:new Date().toISOString(),date:gtd(),event:gc('ec'),member:w,name:n,co:document.getElementById('co').value.trim(),actions:gc('ac'),notes:document.getElementById('no').value.trim()};
  entries.unshift(e);
  try{localStorage.setItem('sv26',JSON.stringify(entries));}catch(x){}
  pat(e,function(err){
    btn.textContent='Log Connection';btn.disabled=false;
    if(err)se('Saved locally. Airtable error: '+err);
    else{he();shT();}
    cf();re();
  });
}

function pat(e,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/log',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<300){cb(null);}
    else{try{var r=JSON.parse(xhr.responseText);cb(r.error||'Status '+xhr.status);}catch(x){cb('Status '+xhr.status);}}
  };
  xhr.onerror=function(){cb('Network error');};
  xhr.send(JSON.stringify({fields:{'Date':e.date,'Where Met':e.event,'SV Team Member':e.member,'External Name':e.name,'Their Company':e.co,'Action Tags':e.actions,'Notes / Next Steps':e.notes,'Logged At':e.ts}}));
}

function cf(){
  document.getElementById('nm').value='';document.getElementById('co').value='';document.getElementById('no').value='';
  document.getElementById('acl').classList.remove('open');
  document.querySelectorAll('.chip.on').forEach(function(c){c.classList.remove('on');});
  document.getElementById('nm').focus();
}

function shT(){var t=document.getElementById('toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function del(id){entries=entries.filter(function(e){return e.id!==id;});try{localStorage.setItem('sv26',JSON.stringify(entries));}catch(x){}re();}

function re(){
  document.getElementById('tc').textContent=entries.length;
  var el=document.getElementById('el');
  if(!entries.length){el.innerHTML='<div class="empty">No connections logged yet.</div>';return;}
  var h='';
  for(var i=0;i<entries.length;i++){
    var e=entries[i],tags='';
    if(e.actions)e.actions.split(', ').forEach(function(a){tags+='<span class="et">'+esc(a)+'</span>';});
    h+='<div class="ec"><button class="db" onclick="del('+e.id+')">x</button><div class="en">'+esc(e.name)+'</div><div class="eco">'+esc(e.co||'')+'</div><div class="em">'+esc(e.member)+' &middot; '+esc(e.event||'No event')+' &middot; '+esc(e.date)+'</div>'+(tags?'<div style="margin-top:5px">'+tags+'</div>':'')+(e.notes?'<div class="eno">'+esc(e.notes)+'</div>':'')+'</div>';
  }
  el.innerHTML=h;
}

function sv(v){
  document.getElementById('v0').style.display=v===0?'block':'none';
  document.getElementById('v1').style.display=v===1?'block':'none';
  document.getElementById('b0').className='hbtn blog'+(v===0?' bav':'');
  document.getElementById('b1').className='hbtn blist'+(v===1?' bav':'');
  if(v===1)re();
}

function xcsv(){
  if(!entries.length){alert('No entries to export.');return;}
  var rows=['Date,Where Met,SV Team Member,External Name,Their Company,Action Tags,Notes'];
  entries.forEach(function(e){rows.push([e.date,e.event,e.member,e.name,e.co,e.actions,e.notes].map(function(v){return '"'+(v||'').replace(/"/g,'""')+'"';}).join(','));});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='Transform2026.csv';a.click();
}
